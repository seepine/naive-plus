<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="./node_modules/naive-plus/dist/index.css"
    />
    <title>Esm App</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="importmap">
      {
        "imports": {
          "vue": "https://esm.sh/vue/dist/vue.esm-bundler.js",
          "naive-plus": "./node_modules/naive-plus/dist/index.mjs"
        }
      }
    </script>
    <script type="module">
      import { createApp } from 'vue'
      import UI from 'naive-plus'

      const app = createApp({
        template: `
          <np-button></np-button>
        `,
      })

      app.use(UI)
      app.mount('#app')

      console.log(UI)
    </script>
  </body>
</html>
